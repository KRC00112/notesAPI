name: deploy-latest-image-to-eks

on:
  workflow_run:
    workflows: [build-and-push-docker-image]
    types:
      - completed

  workflow_dispatch:

jobs:
  deploy-job:
    runs-on: ubuntu-22.04
    if: ${{github.event.workflow_run.conclusion=='success'}}
    steps:
      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: us-west-2

      - name:  update kubeconfig
        run: aws eks --region us-west-2 update-kubeconfig --name ${{secrets.EKS_CLUSTER_NAME}}

      - name: deploy latest image
        run: |
          kubectl set image deployment/notesapi-deployment notesapi-container=krcdocker2138/notes-backend:test 
          kubectl rollout status deployment/notesapi-deployment
          




